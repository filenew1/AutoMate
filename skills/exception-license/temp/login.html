<!DOCTYPE html>

<html lang="zh"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>公共服务</title>
    <meta name="description" content="数据接入系统后台管理框架">
    <link href="./login_files/bootstrap.min.css" rel="stylesheet">
    <link href="./login_files/font-awesome.min.css" rel="stylesheet">
    <link href="./login_files/style.min.css" rel="stylesheet">
    <link href="./login_files/login.min.css" rel="stylesheet">
    <link href="./login_files/ry-ui.css" rel="stylesheet">
    <!-- 360浏览器急速模式 -->
    <meta name="renderer" content="webkit">
    <!-- 避免IE使用兼容模式 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="shortcut icon" href="https://zh.fgw.sz.gov.cn/operWeb/favicon.ico">
    <style type="text/css">label.error { position:inherit;  }</style>
    <script>
        if(window.top!==window.self){alert('未登录或登录超时。请重新登录');window.top.location=window.location};
    </script>
<link rel="stylesheet" href="./login_files/layer.css" id="layuicss-layer"></head>
<body class="signin">
    <div style="padding-top: 15px;padding-left: 36px;display: flex;justify-content: flex-start;align-items: center;">
        <div>
            <img src="./login_files/profile.jpg" class="el-image__inner" style="width: 50px">
        </div>
        <span contenteditable="false" style="box-sizing: border-box;color: #FFFFFF;font-size: 26px;font-weight: 600;padding: 10px">深圳市发展和改革委员会 </span>
    </div>
    <div class="signinpanel">
        <div class="row">
            <div class="col-sm-7" style="left: -200px;top:-50px">
                <div class="signin-info">
                    <h1 class="no-margins" style="box-sizing: border-box;font-size: 64px;color: #FFFFFF;font-weight: 600;">公共服务</h1>
                </div>
            </div>
            <div class="col-sm-5" style="left: 40%">
                <form id="signupForm" autocomplete="off" novalidate="novalidate">
                    <h1 class="no-margins" style="text-align: center">欢迎您！请登录 </h1>
                    <input style="margin-top: 30px" type="text" name="u_content" class="form-control uname valid" placeholder="用户名" aria-invalid="false">
                    <input style="margin-top: 30px" type="password" name="p_content" class="form-control pword valid" placeholder="密码" aria-invalid="false">
                    
					
                    <div class="checkbox-custom m-t">
				        <input type="checkbox" id="rememberme" name="rememberme"> <label for="rememberme">记住我</label>
				    </div>
                    <button class="btn btn-success btn-block" id="btnSubmit" data-loading="正在验证登录，请稍候...">登录</button>
                </form>
            </div>
        </div>
    </div>
<script> var ctx = "\/operWeb\/"; var captchaType = "math"; </script>
